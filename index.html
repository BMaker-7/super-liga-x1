<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Super Liga X1</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
}

header{
background:linear-gradient(90deg,#1d4ed8,#2563eb);
padding:20px;
text-align:center;
}

.menu{
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
margin-top:40px;
}

button{
padding:14px;
width:220px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
}

.section{
display:none;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #334155;
padding:8px;
text-align:center;
}

.top1{background:#fbbf24;color:black}
.top2{background:#cbd5f5;color:black}
.top3{background:#f59e0b;color:black}

.playerCard{
background:#1e293b;
padding:10px;
margin:8px 0;
border-radius:8px;
}

</style>

</head>

<body>

<header>

<h1>🏆 Super Liga X1</h1>
<p>Temporada 1</p>

</header>

<div id="menu" class="menu">

<button onclick="openPage('table')">⚽ Classificação</button>
<button onclick="openPage('matches')">📅 Rodadas</button>
<button onclick="openPage('scorers')">🥇 Artilharia</button>
<button onclick="openPage('players')">👤 Jogadores</button>
<button onclick="openPage('stats')">📊 Estatísticas</button>
<button onclick="openPage('rules')">📜 Regras</button>

</div>

<div id="table" class="section">

<button onclick="back()">⬅ Voltar</button>

<h2>Classificação</h2>

<table id="tableData"></table>

</div>

<div id="matches" class="section">

<button onclick="back()">⬅ Voltar</button>

<h2>Rodadas</h2>

<div id="matchesList"></div>

</div>

<div id="scorers" class="section">

<button onclick="back()">⬅ Voltar</button>

<h2>Artilharia</h2>

<div id="scorerList"></div>

</div>

<div id="players" class="section">

<button onclick="back()">⬅ Voltar</button>

<h2>Jogadores</h2>

<div id="playerList"></div>

</div>

<div id="stats" class="section">

<button onclick="back()">⬅ Voltar</button>

<h2>Estatísticas</h2>

<div id="statsBox"></div>

</div>

<div id="rules" class="section">

<button onclick="back()">⬅ Voltar</button>

<h2>Regras</h2>

<textarea id="rulesText" style="width:100%;height:150px"></textarea>

</div>

<script>

let admin=location.search.includes("admin")

let players=JSON.parse(localStorage.getItem("players")||"[]")
let matches=JSON.parse(localStorage.getItem("matches")||"[]")

function save(){
localStorage.setItem("players",JSON.stringify(players))
localStorage.setItem("matches",JSON.stringify(matches))
}

function openPage(id){

document.getElementById("menu").style.display="none"

document.querySelectorAll(".section").forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

render()

}

function back(){

document.getElementById("menu").style.display="flex"

document.querySelectorAll(".section").forEach(s=>s.style.display="none")

}

function render(){

renderTable()
renderPlayers()
renderScorers()
renderStats()

}

function renderTable(){

let table=document.getElementById("tableData")

table.innerHTML=`
<tr>
<th>#</th>
<th>Jogador</th>
<th>P</th>
<th>J</th>
<th>V</th>
<th>E</th>
<th>D</th>
<th>GP</th>
<th>GC</th>
<th>SG</th>
<th>AP%</th>
</tr>
`

players.sort((a,b)=>b.p-a.p)

players.forEach((p,i)=>{

let ap=p.j?((p.p/(p.j*3))*100).toFixed(1):0

let cls=""

if(i==0)cls="top1"
if(i==1)cls="top2"
if(i==2)cls="top3"

table.innerHTML+=`
<tr class="${cls}">
<td>${i+1}</td>
<td>${p.name}</td>
<td>${p.p}</td>
<td>${p.j}</td>
<td>${p.v}</td>
<td>${p.e}</td>
<td>${p.d}</td>
<td>${p.gp}</td>
<td>${p.gc}</td>
<td>${p.sg}</td>
<td>${ap}%</td>
</tr>
`

})

}

function renderPlayers(){

let box=document.getElementById("playerList")

box.innerHTML=""

players.forEach(p=>{

box.innerHTML+=`
<div class="playerCard">

<b>${p.name}</b><br>

Jogos: ${p.j}<br>
Vitórias: ${p.v}<br>
Gols: ${p.gp}

</div>
`

})

}

function renderScorers(){

let box=document.getElementById("scorerList")

let sorted=[...players].sort((a,b)=>b.gp-a.gp)

box.innerHTML=""

sorted.forEach((p,i)=>{

box.innerHTML+=`
<div>

${i+1}º ${p.name} — ${p.gp} gols

</div>
`

})

}

function renderStats(){

let box=document.getElementById("statsBox")

if(players.length==0)return

let bestAttack=[...players].sort((a,b)=>b.gp-a.gp)[0]

let bestDefense=[...players].sort((a,b)=>a.gc-b.gc)[0]

let leader=[...players].sort((a,b)=>b.p-a.p)[0]

box.innerHTML=`

Melhor ataque: ${bestAttack.name} (${bestAttack.gp})<br><br>

Melhor defesa: ${bestDefense.name} (${bestDefense.gc})<br><br>

Líder atual: ${leader.name}

`

}

render()

</script>

</body>

  </html>
